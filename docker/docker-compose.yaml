services:
  codex:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    stdin_open: true
    tty: true
    volumes:
      - ../files:/files
      - codex-home:/home/user
    ports:
      - "${HTTP_PORT:-8080}:8080"
      - "${HTTPS_PORT:-4430}:4430"
      - "${RDP_PORT:-33890}:3389"
      # Uncomment to enable SSH access (set a strong USER_PASSWORD first!)
      # - "${SSH_PORT:-2222}:22"
      # - "60000-60010:60000-60010/udp"
    environment:
      - USER_PASSWORD=${USER_PASSWORD:-changeme}
      - TZ=${TZ:-America/Los_Angeles}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_OAUTH_TOKEN=${OPENAI_OAUTH_TOKEN:-}
    env_file: ../settings.txt
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"

volumes:
  codex-home:
